apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vaultstream-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: vaultstream.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: vaultstream-api
            port:
              number: 80
