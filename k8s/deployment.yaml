apiVersion: apps/v1
kind: Deployment
metadata:
  name: vaultstream-api
  labels:
    app: vaultstream-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: vaultstream-api
  template:
    metadata:
      labels:
        app: vaultstream-api
    spec:
      containers:
      - name: vaultstream-api
        image: vaultstream-api:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        env:
        - name: ConnectionStrings__DefaultConnection
          value: "Host=vaultstream-db;Database=VaultStreamDb;Username=postgres;Password=postgres"
